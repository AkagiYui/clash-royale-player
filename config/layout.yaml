# 归一化虚拟画布上的 ROI 比例(坐标均为 [0,1] 分数,不用绝对像素)。
# 这些是竖屏皇室战争的经验初值,需要用真实截图校准
# (`crplayer calibrate` 可叠加网格辅助人工核对)。UI 改版后在此调整即可。

# 虚拟画布目标宽高(像素)。任意分辨率输入先归一化到此画布再做感知。
canvas:
  width: 720
  height: 1280
  # 竖屏标准宽高比 9:16;若实际截图带黑边/异形屏,由 normalize 做区域检测+校正。

# 战场可玩区域(用于逻辑网格换算)。CR 竞技场标准 18 列 x 32 行。
arena:
  roi: [0.0, 0.11, 1.0, 0.62]   # x, y, w, h
  grid_cols: 18
  grid_rows: 32

# 圣水条:规则法(像素计数)。10 格。
elixir:
  roi: [0.205, 0.945, 0.775, 0.028]
  max: 10

# 手牌:4 张在手 + 1 张下一张。next 在左下角。
hand:
  # 4 张手牌整体区域,运行时等分为 4 槽
  slots_roi: [0.235, 0.855, 0.755, 0.12]
  slot_count: 4
  next_roi: [0.035, 0.875, 0.13, 0.09]

# 计时器 / 比分:OCR。右上角。
timer:
  roi: [0.80, 0.015, 0.19, 0.045]

# 六座塔的锚点(中心比例坐标),用于反推逻辑网格,以及定位血条。
# 下方=己方(ally),上方=敌方(enemy)。
towers:
  enemy_king:       [0.500, 0.140]
  enemy_princess_l: [0.235, 0.205]
  enemy_princess_r: [0.765, 0.205]
  ally_princess_l:  [0.235, 0.610]
  ally_princess_r:  [0.765, 0.610]
  ally_king:        [0.500, 0.680]
  # 血条相对塔中心的偏移与尺寸(比例),规则法读血用。
  hp_bar:
    dy: -0.045       # 血条在塔中心上方
    w: 0.11
    h: 0.012
